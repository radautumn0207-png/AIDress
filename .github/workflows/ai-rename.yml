name: AI Auto Rename Assets

on:
  push:
    branches: [ main ]
    paths: [ 'images/**' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ai-process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests

      - name: 🚀 執行 14 段辨識與改名
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: 💾 推送變更回 GitHub (含容錯機制)
        run: |
          git config --global user.name "AI-Asset-Bot"
          git config --global user.email "actions@github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "✨ AI 自動更新 14 段資產標籤 [skip ci]" && git push)
